name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install fish shell (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install fish shell (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Build vltl
        run: cargo build --release

      - name: Run E2E tests
        run: |
          export PATH=$PATH:$(pwd)/target/release
          chmod +x e2e_test.fish
          fish e2e_test.fish
