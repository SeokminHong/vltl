name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Bump version
        id: new
        run: node .github/scripts/bump-version.mjs "${{ inputs.bump }}"

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Commit version bump
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v${{ steps.new.outputs.version }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git push

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ steps.new.outputs.version }}" --target "${{ steps.commit.outputs.sha }}" --generate-notes
